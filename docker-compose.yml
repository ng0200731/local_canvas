services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: canvas
      POSTGRES_PASSWORD: canvas
      POSTGRES_DB: canvas_dev
    ports:
      # Host 15432: Windows often reserves 5432 via Hyper-V/WSL excluded ranges.
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canvas -d canvas_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
